apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{APP}}-hpa
  namespace: {{NAMESPACE}}
  labels:
    app: {{APP}}
spec:
  minReplicas: 1
  maxReplicas: 3
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: {{APP}}
  metrics:
  - type: ContainerResource
    containerResource:
      container: {{APP}}-image
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
